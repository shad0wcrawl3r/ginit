name: Update packages.json

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate packages.json
        run: go run ./cmd/genpkgs -o internal/pkgdata/packages.json

      - name: Commit and push if changed
        run: |
          git diff --quiet internal/pkgdata/packages.json && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add internal/pkgdata/packages.json
          git commit -m "chore: update packages.json"
          git push
